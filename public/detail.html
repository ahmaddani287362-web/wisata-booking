<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/config.js"></script>
    <style>
        .detail-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 32px;
            padding: 48px;
            color: white;
            margin-bottom: 48px;
            text-align: center;
        }
        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            margin-top: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        .section-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid #e2e8f0;
        }
        .booking-card {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            color: white;
            margin-top: 48px;
        }
        .booking-card .btn-wa {
            background: #25D366;
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #0f766e;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <a href="javascript:history.back()" class="back-button">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
        <div id="detailContent">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const id = urlParams.get('id');

    async function loadDetail() {
        try {
            const res = await fetch(`${API_ENDPOINTS[type]}s/${id}`);
            const item = await res.json();
            const container = document.getElementById('detailContent');
            
            if (!item) {
                container.innerHTML = '<p>Data tidak ditemukan</p>';
                return;
            }
            
            if (type === 'tour') {
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${escapeHtml(item.title)}</h1>
                        <div class="price-tag">Rp ${new Intl.NumberFormat('id-ID').format(item.price)}</div>
                        <p>${item.duration || 'Full Day'}</p>
                    </div>
                    <div class="info-grid">
                        <div class="info-card"><i class="fas fa-clock"></i><h4>Durasi</h4><p>${item.duration || '10-12 jam'}</p></div>
                        <div class="info-card"><i class="fas fa-car"></i><h4>Transportasi</h4><p>Private Car</p></div>
                        <div class="info-card"><i class="fas fa-language"></i><h4>Driver</h4><p>English Speaking</p></div>
                        <div class="info-card"><i class="fas fa-utensils"></i><h4>Makan</h4><p>Lunch Included</p></div>
                    </div>
                    <div class="section-card"><h3>📝 Description</h3><p>${escapeHtml(item.description)}</p></div>
                    <div class="booking-card">
                        <h3>Ready to Book?</h3>
                        <a href="https://wa.me/6281234567890?text=Saya ingin booking ${escapeHtml(item.title)}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                        </a>
                    </div>
                `;
            } else if (type === 'activity') {
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${escapeHtml(item.title)}</h1>
                        <div class="price-tag">Rp ${new Intl.NumberFormat('id-ID').format(item.price)}</div>
                        <p>${item.duration || '2-3 jam'}</p>
                    </div>
                    <div class="section-card"><h3>📝 Description</h3><p>${escapeHtml(item.description)}</p></div>
                    <div class="section-card"><h3>✅ What's Included</h3><p>${escapeHtml(item.included || '-')}</p></div>
                    <div class="section-card"><h3>⭐ Highlights</h3><p>${escapeHtml(item.highlights || '-')}</p></div>
                    <div class="booking-card">
                        <h3>Ready to Book?</h3>
                        <a href="https://wa.me/6281234567890?text=Saya ingin booking ${escapeHtml(item.title)}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                        </a>
                    </div>
                `;
            } else if (type === 'villa') {
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${escapeHtml(item.name)}</h1>
                        <div class="price-tag">Rp ${new Intl.NumberFormat('id-ID').format(item.price)}/malam</div>
                        <p>${escapeHtml(item.location)}</p>
                    </div>
                    <div class="section-card"><h3>📝 Description</h3><p>${escapeHtml(item.description)}</p></div>
                    <div class="section-card"><h3>✨ Facilities</h3><p>${escapeHtml(item.facilities)}</p></div>
                    <div class="booking-card">
                        <h3>Ready to Book?</h3>
                        <a href="https://wa.me/6281234567890?text=Saya ingin booking ${escapeHtml(item.name)}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                        </a>
                    </div>
                `;
            }
        } catch(e) {
            document.getElementById('detailContent').innerHTML = '<p>Gagal memuat data</p>';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    if (type && id) loadDetail();
</script>
</body>
</html>
