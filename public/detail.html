<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Paket - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 32px;
            padding: 48px;
            color: white;
            margin-bottom: 48px;
            text-align: center;
        }
        .detail-header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            margin-top: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .info-card {
            background: #f8fafc;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
        }
        .info-card i {
            font-size: 2rem;
            color: #0f766e;
            margin-bottom: 12px;
        }
        .info-card h4 {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        .info-card p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }
        .included-list {
            background: #f8fafc;
            border-radius: 24px;
            padding: 32px;
            margin: 32px 0;
        }
        .included-list h3 {
            font-size: 1.3rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .included-list ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .included-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 16px;
        }
        .included-list li i {
            color: #10b981;
            font-size: 1.2rem;
        }
        .booking-card {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            color: white;
            margin-top: 48px;
        }
        .booking-card h3 {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        .booking-card .btn-wa {
            background: #25D366;
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            transition: 0.2s;
        }
        .booking-card .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }
        .section-title-small {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 32px 0 20px;
            color: #0f172a;
            border-left: 4px solid #0f766e;
            padding-left: 16px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #0f766e;
            font-weight: 500;
            margin-bottom: 24px;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
        }
        .back-button:hover {
            background: #f8fafc;
            transform: translateX(-5px);
        }
        @media (max-width: 768px) {
            .detail-header {
                padding: 32px 20px;
            }
            .detail-header h1 {
                font-size: 1.6rem;
            }
            .price-tag {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <a href="javascript:history.back()" class="back-button">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
        <div id="detailContent">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const id = urlParams.get('id');

    async function loadDetail() {
        try {
            const res = await fetch(`/api/${type}s/${id}`);
            const item = await res.json();
            const container = document.getElementById('detailContent');
            
            if (!item || Object.keys(item).length === 0) {
                container.innerHTML = '<p style="text-align:center">Data tidak ditemukan</p>';
                return;
            }
            
            if (type === 'tour') {
                // Parse itinerary menjadi list yang rapi
                const includedItems = parseIncludedItems(item.itinerary);
                const pricePer = item.title.toLowerCase().includes('driver') ? '/mobil' : '/pax';
                
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${escapeHtml(item.title)}</h1>
                        <div class="price-tag">
                            IDR ${new Intl.NumberFormat('id-ID').format(item.price)}${pricePer}
                        </div>
                        <p style="margin-top: 16px; opacity: 0.95;">${item.duration || 'Full Day Tour'}</p>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-card">
                            <i class="fas fa-clock"></i>
                            <h4>Durasi</h4>
                            <p>${item.duration || '10-12 jam'}</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-car"></i>
                            <h4>Transportasi</h4>
                            <p>Private Car + AC</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-language"></i>
                            <h4>Driver</h4>
                            <p>English Speaking</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-utensils"></i>
                            <h4>Makan</h4>
                            <p>Lunch Included</p>
                        </div>
                    </div>
                    
                    <div class="included-list">
                        <h3><i class="fas fa-check-circle" style="color: #10b981;"></i> What's Included:</h3>
                        <ul>
                            ${includedItems.map(item => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(item)}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div style="margin: 32px 0;">
                        <h3 class="section-title-small">📝 Deskripsi Tour</h3>
                        <p style="line-height: 1.8; color: #334155;">${escapeHtml(item.description || 'Nikmati pengalaman liburan tak terlupakan di Bali dengan paket tour eksklusif ini.')}</p>
                    </div>
                    
                    <div class="booking-card">
                        <h3>✈️ Ready untuk Berpetualang?</h3>
                        <p>Booking sekarang melalui WhatsApp. Payment on arrival! 💳</p>
                        <a href="https://wa.me/6281234567890?text=${encodeURIComponent(`Halo, saya ingin booking tour: ${item.title}\n\nDurasi: ${item.duration || 'Full Day'}\nHarga: IDR ${new Intl.NumberFormat('id-ID').format(item.price)}\n\nMohon info ketersediaan untuk tanggal berikutnya. Terima kasih!`)}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                        </a>
                        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.9;">✅ Respon cepat dalam < 1 jam</p>
                    </div>
                `;
            } 
            else if (type === 'villa') {
                const facilitiesList = (item.facilities || '').split(',').map(f => f.trim());
                
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${escapeHtml(item.name)}</h1>
                        <div class="price-tag">
                            IDR ${new Intl.NumberFormat('id-ID').format(item.price)}<span style="font-size: 1rem;">/malam</span>
                        </div>
                        <p style="margin-top: 16px;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(item.location || 'Bali, Indonesia')}</p>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-card">
                            <i class="fas fa-bed"></i>
                            <h4>Tipe</h4>
                            <p>Private Villa</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-swimming-pool"></i>
                            <h4>Fasilitas</h4>
                            <p>Private Pool</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-wifi"></i>
                            <h4>Internet</h4>
                            <p>Free Wi-Fi</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-clock"></i>
                            <h4>Check-in/out</h4>
                            <p>14:00 / 12:00</p>
                        </div>
                    </div>
                    
                    <div class="included-list">
                        <h3><i class="fas fa-star" style="color: #f59e0b;"></i> Fasilitas Villa:</h3>
                        <ul>
                            ${facilitiesList.map(f => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(f)}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div style="margin: 32px 0;">
                        <h3 class="section-title-small">🏡 Deskripsi Villa</h3>
                        <p style="line-height: 1.8; color: #334155;">${escapeHtml(item.description || 'Villa mewah dengan desain modern dan fasilitas lengkap untuk liburan impian Anda.')}</p>
                    </div>
                    
                    <div class="booking-card">
                        <h3>🏝️ Ingin Menginap di Sini?</h3>
                        <p>Booking langsung via WhatsApp. Tersedia promo untuk stay 3+ malam!</p>
                        <a href="https://wa.me/6281234567890?text=${encodeURIComponent(`Halo, saya ingin booking villa: ${item.name}\n\nLokasi: ${item.location || 'Bali'}\nHarga: IDR ${new Intl.NumberFormat('id-ID').format(item.price)}/malam\n\nMohon info ketersediaan dan harga terbaik. Terima kasih!`)}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                        </a>
                        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.9;">✅ Respon cepat, payment on arrival</p>
                    </div>
                `;
            }
            
            // Load gambar terpisah
            const mainImage = item.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg';
            const detailHeader = document.querySelector('.detail-header');
            if (detailHeader) {
                detailHeader.style.background = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('${mainImage}')`;
                detailHeader.style.backgroundSize = 'cover';
                detailHeader.style.backgroundPosition = 'center';
            }
            
        } catch(e) {
            console.error(e);
            document.getElementById('detailContent').innerHTML = '<p style="text-align:center">Gagal memuat data detail</p>';
        }
    }

    function parseIncludedItems(itinerary) {
        if (!itinerary) {
            return [
                'Private Hotel Pick-up and Drop-off',
                'Private Car with Air Conditioning',
                'Driver (English speaking)',
                'Lunch (Indonesian Food)',
                'Bottled Water',
                'All Entrance Fees'
            ];
        }
        
        // Pisahkan berdasarkan newline dan filter yang dimulai dengan ✅ atau bullet point
        const lines = itinerary.split('\n');
        const items = lines
            .map(line => line.replace(/^[✅\-\*]\s*/, '').trim())
            .filter(line => line.length > 0 && !line.toLowerCase().includes('day') && !line.toLowerCase().includes('pick up'));
        
        if (items.length === 0) {
            return [
                'Private Hotel Pick-up and Drop-off',
                'Private Car with Air Conditioning',
                'Driver (English speaking)',
                'Lunch (Indonesian Food)',
                'Bottled Water',
                'All Entrance Fees'
            ];
        }
        
        return items;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    if (type && id) {
        loadDetail();
    } else {
        document.getElementById('detailContent').innerHTML = '<p style="text-align:center">Parameter tidak valid</p>';
    }
</script>
</body>
</html>
