<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 32px;
            padding: 48px;
            color: white;
            margin-bottom: 48px;
            position: relative;
            overflow: hidden;
        }
        .detail-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            z-index: 0;
        }
        .detail-header > * { position: relative; z-index: 1; }
        .detail-header h1 { font-size: 2.5rem; margin-bottom: 16px; }
        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            margin-top: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .info-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .info-card i { font-size: 1.8rem; color: #0f766e; margin-bottom: 12px; }
        .info-card h4 { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; }
        .info-card p { font-size: 1rem; font-weight: 600; color: #0f172a; }
        .section-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-title-detail {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #0f766e;
            padding-left: 16px;
        }
        .included-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .included-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 16px;
        }
        .included-item i { color: #10b981; }
        .booking-card {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            color: white;
            margin-top: 48px;
        }
        .booking-card .btn-wa {
            background: #25D366;
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #0f766e;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        @media (max-width: 768px) {
            .detail-header { padding: 32px 20px; }
            .detail-header h1 { font-size: 1.6rem; }
            .price-tag { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <a href="javascript:history.back()" class="back-button">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
        <div id="detailContent">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const id = urlParams.get('id');

    async function loadDetail() {
        try {
            const res = await fetch(`/api/${type}s/${id}`);
            const item = await res.json();
            const container = document.getElementById('detailContent');
            
            if (!item || Object.keys(item).length === 0) {
                container.innerHTML = '<p style="text-align:center">Data tidak ditemukan</p>';
                return;
            }
            
            if (type === 'tour') {
                const includedItems = (item.itinerary || '').split('\n').filter(l => l.trim());
                container.innerHTML = `
                    <div class="detail-header" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('${item.image}'); background-size: cover;">
                        <h1>${escapeHtml(item.title)}</h1>
                        <div class="price-tag">IDR ${new Intl.NumberFormat('id-ID').format(item.price)}</div>
                        <p style="margin-top:16px;">${item.duration || 'Full Day Tour'}</p>
                    </div>
                    <div class="info-grid">
                        <div class="info-card"><i class="fas fa-clock"></i><h4>Durasi</h4><p>${item.duration || '10-12 jam'}</p></div>
                        <div class="info-card"><i class="fas fa-car"></i><h4>Transportasi</h4><p>Private Car + AC</p></div>
                        <div class="info-card"><i class="fas fa-language"></i><h4>Driver</h4><p>English Speaking</p></div>
                        <div class="info-card"><i class="fas fa-utensils"></i><h4>Makan</h4><p>Lunch Included</p></div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-gift"></i> What's Included</h3>
                        <div class="included-grid">${includedItems.map(i => `<div class="included-item"><i class="fas fa-check-circle"></i> ${escapeHtml(i)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-align-left"></i> Description</h3>
                        <p>${escapeHtml(item.description)}</p>
                    </div>
                    ${renderBookingCard(item.title, 'tour')}
                `;
            } 
            else if (type === 'activity') {
                const includedItems = (item.included || '').split('\n').filter(l => l.trim());
                const highlightsItems = (item.highlights || '').split('\n').filter(l => l.trim());
                const whatToBringItems = (item.whatToBring || '').split('\n').filter(l => l.trim());
                const additionalInfoItems = (item.additionalInfo || '').split('\n').filter(l => l.trim());
                
                container.innerHTML = `
                    <div class="detail-header" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('${item.image}'); background-size: cover;">
                        <h1>${escapeHtml(item.title)}</h1>
                        <div class="price-tag">IDR ${new Intl.NumberFormat('id-ID').format(item.price)}</div>
                        <p style="margin-top:16px;">${item.duration || '2-3 jam'}</p>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-gift"></i> What's Included</h3>
                        <div class="included-grid">${includedItems.map(i => `<div class="included-item"><i class="fas fa-check-circle"></i> ${escapeHtml(i)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-star"></i> Highlights</h3>
                        <div class="included-grid">${highlightsItems.map(h => `<div class="included-item"><i class="fas fa-crown"></i> ${escapeHtml(h)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-suitcase"></i> What to Bring</h3>
                        <div class="included-grid">${whatToBringItems.map(w => `<div class="included-item"><i class="fas fa-check-circle"></i> ${escapeHtml(w)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-info-circle"></i> Additional Info</h3>
                        <div class="included-grid">${additionalInfoItems.map(a => `<div class="included-item"><i class="fas fa-shield-alt"></i> ${escapeHtml(a)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-file-contract"></i> Terms & Conditions</h3>
                        <p>${escapeHtml(item.terms || 'Payment on arrival. Cancel 1 day before: 50% fee. No-show: 100% fee.')}</p>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-align-left"></i> Description</h3>
                        <p>${escapeHtml(item.description)}</p>
                    </div>
                    ${renderBookingCard(item.title, 'activity')}
                `;
            }
            else if (type === 'villa') {
                const facilitiesList = (item.facilities || '').split(',').map(f => f.trim());
                container.innerHTML = `
                    <div class="detail-header" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('${item.image}'); background-size: cover;">
                        <h1>${escapeHtml(item.name)}</h1>
                        <div class="price-tag">IDR ${new Intl.NumberFormat('id-ID').format(item.price)}<span style="font-size:1rem;">/malam</span></div>
                        <p style="margin-top:16px;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(item.location)}</p>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-star"></i> Facilities</h3>
                        <div class="included-grid">${facilitiesList.map(f => `<div class="included-item"><i class="fas fa-check-circle"></i> ${escapeHtml(f)}</div>`).join('')}</div>
                    </div>
                    <div class="section-card">
                        <h3 class="section-title-detail"><i class="fas fa-align-left"></i> Description</h3>
                        <p>${escapeHtml(item.description)}</p>
                    </div>
                    ${renderBookingCard(item.name, 'villa')}
                `;
            }
        } catch(e) {
            document.getElementById('detailContent').innerHTML = '<p style="text-align:center">Gagal memuat data</p>';
        }
    }

    function renderBookingCard(title, type) {
        const message = `Halo, saya ingin booking ${type === 'tour' ? 'paket tour' : type === 'activity' ? 'aktivitas' : 'villa'}: ${title}. Mohon info ketersediaan dan harga terbaik. Terima kasih!`;
        return `
            <div class="booking-card">
                <h3>✈️ Ready to Book?</h3>
                <p>Booking sekarang melalui WhatsApp. Payment on arrival! 💳</p>
                <a href="https://wa.me/6281234567890?text=${encodeURIComponent(message)}" class="btn-wa" target="_blank">
                    <i class="fab fa-whatsapp"></i> Booking via WhatsApp
                </a>
                <p style="margin-top:20px; font-size:0.8rem;">✅ Respon cepat dalam < 1 jam</p>
            </div>
        `;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    if (type && id) loadDetail();
</script>
</body>
</html>
