<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali Activities - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html" class="active">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <h2 class="section-title">Special Offer: Bali Activities</h2>
        <p style="text-align: center; margin-bottom: 48px; color: #64748b;">Mulai dari IDR 150.000</p>
        <div class="grid" id="activitiesList">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<a href="https://wa.me/6281234567890" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    async function loadActivities() {
        try {
            const res = await fetch('/api/tours');
            const allTours = await res.json();
            // Filter tours dengan harga 150.000 atau mengandung kata 'Activities'
            const activities = allTours.filter(t => t.price === 150000 || t.title.includes('Activities'));
            const container = document.getElementById('activitiesList');
            if (!activities.length) {
                container.innerHTML = '<p style="text-align:center">Belum ada data aktivitas</p>';
                return;
            }
            container.innerHTML = activities.map(activity => `
                <div class="card" onclick="location.href='/detail.html?type=tour&id=${activity.id}'">
                    <img class="card-img" src="${activity.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" alt="${activity.title}">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(activity.title)}</div>
                        <div class="card-price">Rp ${new Intl.NumberFormat('id-ID').format(activity.price)}</div>
                        <div class="card-detail"><i class="far fa-clock"></i> ${activity.duration || '2-3 jam'}</div>
                        <div style="margin-top: 16px;"><span class="btn-outline">Book Now →</span></div>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadActivities();
</script>
</body>
</html>
