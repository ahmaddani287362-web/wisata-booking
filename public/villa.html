<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villas - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/config.js"></script>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html" class="active">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <h2 class="section-title">🏝️ Luxury Villas</h2>
        <div class="grid" id="villaList">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<a href="https://wa.me/6281234567890" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    async function loadVillas() {
        try {
            const res = await fetch(API_ENDPOINTS.villas);
            const villas = await res.json();
            const container = document.getElementById('villaList');
            if (!villas.length) {
                container.innerHTML = '<p style="text-align:center">Belum ada data villa</p>';
                return;
            }
            container.innerHTML = villas.map(villa => `
                <div class="card" onclick="location.href='/detail.html?type=villa&id=${villa.id}'">
                    <img class="card-img" src="${villa.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" alt="${villa.name}">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(villa.name)}</div>
                        <div class="card-price">Rp ${new Intl.NumberFormat('id-ID').format(villa.price)}/malam</div>
                        <div>${villa.location || 'Bali'}</div>
                        <div style="margin-top:16px"><span class="btn-outline">View Details →</span></div>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadVillas();
</script>
</body>
</html>
