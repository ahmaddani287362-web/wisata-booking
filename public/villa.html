<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Villas - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 48px;
            border-radius: 0 0 48px 48px;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        .location-filter {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .location-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .location-btn.active, .location-btn:hover {
            background: #0f766e;
            color: white;
        }
        .price-range {
            text-align: center;
            margin-bottom: 32px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html" class="active">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="page-header">
        <div class="container">
            <h1>🏝️ Luxury Villas</h1>
            <p>Menginap di villa mewah dengan pemandangan terbaik di Bali</p>
        </div>
    </div>

    <div class="container">
        <div class="location-filter" id="locationFilter">
            <button class="location-btn active" data-location="all">All Locations</button>
            <button class="location-btn" data-location="Seminyak">Seminyak</button>
            <button class="location-btn" data-location="Ubud">Ubud</button>
            <button class="location-btn" data-location="Nusa Dua">Nusa Dua</button>
            <button class="location-btn" data-location="Canggu">Canggu</button>
            <button class="location-btn" data-location="Jimbaran">Jimbaran</button>
        </div>
        <div class="price-range" id="resultCount">Menampilkan semua villa</div>
        <div class="grid" id="villaList">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<a href="https://wa.me/6281234567890" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    let allVillas = [];

    async function loadVillas() {
        try {
            const res = await fetch('/api/villas');
            allVillas = await res.json();
            renderVillas(allVillas);
        } catch(e) { console.error(e); }
    }

    function renderVillas(villas) {
        const container = document.getElementById('villaList');
        const resultCount = document.getElementById('resultCount');
        
        if (!villas.length) {
            container.innerHTML = '<p style="text-align:center">Belum ada data villa</p>';
            resultCount.textContent = 'Menampilkan 0 villa';
            return;
        }
        
        resultCount.textContent = `Menampilkan ${villas.length} luxury villas`;
        
        container.innerHTML = villas.map(villa => `
            <div class="card" onclick="location.href='/detail.html?type=villa&id=${villa.id}'">
                <img class="card-img" src="${villa.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" alt="${villa.name}">
                <div class="card-content">
                    <div class="card-title">${escapeHtml(villa.name)}</div>
                    <div class="card-price">Rp ${new Intl.NumberFormat('id-ID').format(villa.price)}<span style="font-size:0.9rem;">/malam</span></div>
                    <div class="card-detail"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(villa.location || 'Bali')}</div>
                    <div style="margin-top: 16px;"><span class="btn-outline">View Details →</span></div>
                </div>
            </div>
        `).join('');
    }

    function filterByLocation(location) {
        if (location === 'all') {
            renderVillas(allVillas);
            document.getElementById('resultCount').textContent = `Menampilkan semua ${allVillas.length} villa`;
        } else {
            const filtered = allVillas.filter(v => v.location && v.location.includes(location));
            renderVillas(filtered);
            document.getElementById('resultCount').textContent = `Menampilkan ${filtered.length} villa di ${location}`;
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Location filter
    document.querySelectorAll('.location-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.location-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            filterByLocation(this.dataset.location);
        });
    });

    loadVillas();
</script>
</body>
</html>
