<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Wanderly CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a, #1e293b); }
        .login-card { background: white; padding: 48px; border-radius: 32px; width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 12px 0; border: 1.5px solid #e2e8f0; border-radius: 16px; }
        .btn-primary { background: #0f766e; color: white; padding: 12px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; width: 100%; }
        .admin-wrapper { display: flex; }
        .sidebar { width: 280px; background: #0f172a; color: white; min-height: 100vh; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid #334155; }
        .nav-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: #0f766e; }
        .main-content { flex: 1; margin-left: 280px; padding: 24px; }
        .top-bar { background: white; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 20px; border-radius: 40px; border: none; cursor: pointer; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 20px; padding: 24px; display: flex; justify-content: space-between; align-items: center; }
        .stat-card h3 { font-size: 2rem; color: #0f766e; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .btn-edit { background: #f59e0b; color: white; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; margin-right: 8px; }
        .btn-delete { background: #ef4444; color: white; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-add { background: #0f766e; color: white; padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; }
        .form-container { display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 16px; }
        .form-container.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-grid .full-width { grid-column: span 2; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; padding: 32px; width: 550px; max-width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1100; }
        .toast.error { background: #ef4444; }
        .table-image { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); position: fixed; z-index: 1000; } .main-content { margin-left: 0; } .form-grid { grid-template-columns: 1fr; } .form-grid .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button class="btn-primary" onclick="login()">Login</button>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="sidebar">
            <div class="sidebar-header"><h2>Wanderly CMS</h2></div>
            <div class="nav-item" data-section="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" data-section="tours"><i class="fas fa-umbrella-beach"></i> Tours</div>
            <div class="nav-item" data-section="activities"><i class="fas fa-biking"></i> Activities</div>
            <div class="nav-item" data-section="villas"><i class="fas fa-home"></i> Villas</div>
            <div class="nav-item" data-section="contacts"><i class="fas fa-envelope"></i> Contacts</div>
        </div>
        <div class="main-content">
            <div class="top-bar"><h1 id="pageTitle">Dashboard</h1><button class="logout-btn" onclick="logout()">Logout</button></div>
            <div id="contentArea"><div class="spinner" style="text-align:center; padding:40px;">Loading...</div></div>
        </div>
    </div>
</div>

<div id="editModal" class="modal"><div class="modal-content"><h3 id="modalTitle">✏️ Edit</h3><form id="editForm"><div id="editFields"></div><div class="modal-buttons"><button type="submit" class="btn-primary">Save</button><button type="button" onclick="closeModal()">Cancel</button></div></form></div></div>
<div id="deleteModal" class="modal"><div class="modal-content" style="text-align:center"><h3>Confirm Delete</h3><p>Are you sure?</p><div class="modal-buttons"><button class="btn-delete" id="confirmDeleteBtn">Delete</button><button onclick="closeDeleteModal()">Cancel</button></div></div></div>

<script>
    let adminToken = localStorage.getItem('adminToken');
    let pendingDelete = null;
    let currentSection = 'dashboard';

    function showToast(msg, type = 'success') {
        let toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function getAuthHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` };
    }

    async function login() {
        let username = document.getElementById('username').value;
        let password = document.getElementById('password').value;
        let res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (res.ok) {
            let data = await res.json();
            adminToken = data.token;
            localStorage.setItem('adminToken', adminToken);
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            showToast('Welcome Admin!');
            loadSection('dashboard');
        } else {
            showToast('Login failed', 'error');
        }
    }

    function logout() {
        localStorage.removeItem('adminToken');
        location.reload();
    }

    if (adminToken) {
        fetch('/api/admin/check', { headers: { 'Authorization': `Bearer ${adminToken}` } })
            .then(r => r.json())
            .then(data => {
                if (data.isAdmin) {
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadSection('dashboard');
                } else {
                    localStorage.removeItem('adminToken');
                }
            });
    }

    // Event listener untuk nav items
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function(e) {
            let section = this.getAttribute('data-section');
            if (section) loadSection(section);
        });
    });

    async function loadSection(section) {
        currentSection = section;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector(`.nav-item[data-section="${section}"]`).classList.add('active');
        
        let titles = { dashboard: 'Dashboard', tours: 'Tour Packages', activities: 'Activities', villas: 'Villas', contacts: 'Contact Messages' };
        document.getElementById('pageTitle').innerText = titles[section] || section;
        
        if (section === 'dashboard') await loadDashboard();
        else if (section === 'tours') await loadTours();
        else if (section === 'activities') await loadActivities();
        else if (section === 'villas') await loadVillas();
        else if (section === 'contacts') await loadContacts();
    }

    async function loadDashboard() {
        try {
            let tours = await (await fetch('/api/tours')).json();
            let acts = await (await fetch('/api/activities')).json();
            let villas = await (await fetch('/api/villas')).json();
            let contactsRes = await fetch('/api/contacts', { headers: getAuthHeaders() });
            let contacts = contactsRes.ok ? await contactsRes.json() : [];
            document.getElementById('contentArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div><h3>${tours.length}</h3><p>Tours</p></div><i class="fas fa-umbrella-beach" style="font-size:2rem;"></i></div>
                    <div class="stat-card"><div><h3>${acts.length}</h3><p>Activities</p></div><i class="fas fa-biking" style="font-size:2rem;"></i></div>
                    <div class="stat-card"><div><h3>${villas.length}</h3><p>Villas</p></div><i class="fas fa-home" style="font-size:2rem;"></i></div>
                    <div class="stat-card"><div><h3>${contacts.length}</h3><p>Messages</p></div><i class="fas fa-envelope" style="font-size:2rem;"></i></div>
                </div>
            `;
        } catch(e) { console.error(e); }
    }

    async function loadTours() {
        let data = await (await fetch('/api/tours')).json();
        let html = `<div class="card"><div class="card-header"><h3>Tours</h3><button class="btn-add" onclick="toggleAddForm('tour')">+ Add Tour</button></div>
            <div id="tourAddForm" class="form-container"><form id="addTourForm"><div class="form-grid">
            <div class="full-width"><input type="text" name="title" placeholder="Title" required></div>
            <div><input type="number" name="price" placeholder="Price" required></div>
            <div><input type="text" name="duration" placeholder="Duration"></div>
            <div class="full-width"><input type="text" name="imageUrl" placeholder="Image URL"></div>
            <div class="full-width"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="full-width"><textarea name="itinerary" placeholder="What's Included" rows="4"></textarea></div>
            </div><button type="submit" class="btn-primary">Save</button></form></div>
            <div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Image</th><th>Title</th><th>Price</th><th>Duration</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.title)}</td><td>Rp ${d.price.toLocaleString()}</td><td>${d.duration || '-'}</td>
            <td><button class="btn-edit" onclick="openEditModal('tour', ${d.id})">Edit</button><button class="btn-delete" onclick="confirmDelete('tour', ${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addTourForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            let res = await fetch('/api/tours', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ title: fd.get('title'), price: parseInt(fd.get('price')), duration: fd.get('duration'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), itinerary: fd.get('itinerary') }) });
            if (res.ok) { showToast('Tour added!'); loadSection('tours'); } else showToast('Failed', 'error');
        });
    }

    async function loadActivities() {
        let data = await (await fetch('/api/activities')).json();
        let html = `<div class="card"><div class="card-header"><h3>Activities</h3><button class="btn-add" onclick="toggleAddForm('activity')">+ Add Activity</button></div>
            <div id="activityAddForm" class="form-container"><form id="addActivityForm"><div class="form-grid">
            <div class="full-width"><input type="text" name="title" placeholder="Title" required></div>
            <div><input type="number" name="price" placeholder="Price" required></div>
            <div><input type="text" name="duration" placeholder="Duration"></div>
            <div class="full-width"><input type="text" name="imageUrl" placeholder="Image URL"></div>
            <div class="full-width"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="full-width"><textarea name="included" placeholder="What's Included" rows="4"></textarea></div>
            <div class="full-width"><textarea name="highlights" placeholder="Highlights" rows="3"></textarea></div>
            <div class="full-width"><textarea name="whatToBring" placeholder="What to Bring" rows="3"></textarea></div>
            <div class="full-width"><textarea name="additionalInfo" placeholder="Additional Info" rows="3"></textarea></div>
            <div class="full-width"><textarea name="terms" placeholder="Terms" rows="3"></textarea></div>
            </div><button type="submit" class="btn-primary">Save</button></form></div>
            <div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Image</th><th>Title</th><th>Price</th><th>Duration</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.title)}</td><td>Rp ${d.price.toLocaleString()}</td><td>${d.duration || '-'}</td>
            <td><button class="btn-edit" onclick="openEditModal('activity', ${d.id})">Edit</button><button class="btn-delete" onclick="confirmDelete('activity', ${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addActivityForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            let res = await fetch('/api/activities', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ title: fd.get('title'), price: parseInt(fd.get('price')), duration: fd.get('duration'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), included: fd.get('included'), highlights: fd.get('highlights'), whatToBring: fd.get('whatToBring'), additionalInfo: fd.get('additionalInfo'), terms: fd.get('terms') }) });
            if (res.ok) { showToast('Activity added!'); loadSection('activities'); } else showToast('Failed', 'error');
        });
    }

    async function loadVillas() {
        let data = await (await fetch('/api/villas')).json();
        let html = `<div class="card"><div class="card-header"><h3>Villas</h3><button class="btn-add" onclick="toggleAddForm('villa')">+ Add Villa</button></div>
            <div id="villaAddForm" class="form-container"><form id="addVillaForm"><div class="form-grid">
            <div class="full-width"><input type="text" name="name" placeholder="Name" required></div>
            <div><input type="number" name="price" placeholder="Price" required></div>
            <div><input type="text" name="location" placeholder="Location"></div>
            <div class="full-width"><input type="text" name="imageUrl" placeholder="Image URL"></div>
            <div class="full-width"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="full-width"><textarea name="facilities" placeholder="Facilities" rows="3"></textarea></div>
            </div><button type="submit" class="btn-primary">Save</button></form></div>
            <div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Location</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.name)}</td><td>Rp ${d.price.toLocaleString()}/night</td><td>${d.location || '-'}</td>
            <td><button class="btn-edit" onclick="openEditModal('villa', ${d.id})">Edit</button><button class="btn-delete" onclick="confirmDelete('villa', ${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addVillaForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            let res = await fetch('/api/villas', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ name: fd.get('name'), price: parseInt(fd.get('price')), location: fd.get('location'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), facilities: fd.get('facilities') }) });
            if (res.ok) { showToast('Villa added!'); loadSection('villas'); } else showToast('Failed', 'error');
        });
    }

    async function loadContacts() {
        let res = await fetch('/api/contacts', { headers: getAuthHeaders() });
        if (!res.ok) return;
        let data = await res.json();
        let html = `<div class="card"><h3>Contact Messages</h3><div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td>${escapeHtml(d.name)}</td><td>${escapeHtml(d.email)}</td><td>${d.phone || '-'}</td><td>${escapeHtml(d.message).substring(0, 50)}...</td><td><span style="background:#fef3c7;padding:4px 12px;border-radius:20px;">${d.status}</span></td><td><button class="btn-delete" onclick="confirmDelete('contact', ${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
    }

    function toggleAddForm(type) {
        let form = document.getElementById(`${type}AddForm`);
        if (form) form.classList.toggle('active');
    }

    async function openEditModal(type, id) {
        let res = await fetch(`/api/${type}s/${id}`);
        let item = await res.json();
        document.getElementById('modalTitle').innerHTML = type === 'tour' ? 'Edit Tour' : (type === 'activity' ? 'Edit Activity' : 'Edit Villa');
        let fields = '';
        if (type === 'tour') {
            fields = `<div class="form-group"><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div>
                <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
                <div class="form-group"><label>Duration</label><input id="editDuration" value="${escapeHtml(item.duration || '')}"></div>
                <div class="form-group"><label>Image URL</label><input id="editImageUrl" value="${escapeHtml(item.image || '')}"></div>
                <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3">${escapeHtml(item.description || '')}</textarea></div>
                <div class="form-group"><label>What's Included</label><textarea id="editItinerary" rows="4">${escapeHtml(item.itinerary || '')}</textarea></div>`;
        } else if (type === 'activity') {
            fields = `<div class="form-group"><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div>
                <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
                <div class="form-group"><label>Duration</label><input id="editDuration" value="${escapeHtml(item.duration || '')}"></div>
                <div class="form-group"><label>Image URL</label><input id="editImageUrl" value="${escapeHtml(item.image || '')}"></div>
                <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3">${escapeHtml(item.description || '')}</textarea></div>
                <div class="form-group"><label>What's Included</label><textarea id="editIncluded" rows="4">${escapeHtml(item.included || '')}</textarea></div>
                <div class="form-group"><label>Highlights</label><textarea id="editHighlights" rows="3">${escapeHtml(item.highlights || '')}</textarea></div>
                <div class="form-group"><label>What to Bring</label><textarea id="editWhatToBring" rows="3">${escapeHtml(item.whatToBring || '')}</textarea></div>
                <div class="form-group"><label>Additional Info</label><textarea id="editAdditionalInfo" rows="3">${escapeHtml(item.additionalInfo || '')}</textarea></div>
                <div class="form-group"><label>Terms</label><textarea id="editTerms" rows="3">${escapeHtml(item.terms || '')}</textarea></div>`;
        } else {
            fields = `<div class="form-group"><label>Name</label><input id="editName" value="${escapeHtml(item.name)}"></div>
                <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
                <div class="form-group"><label>Location</label><input id="editLocation" value="${escapeHtml(item.location || '')}"></div>
                <div class="form-group"><label>Image URL</label><input id="editImageUrl" value="${escapeHtml(item.image || '')}"></div>
                <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3">${escapeHtml(item.description || '')}</textarea></div>
                <div class="form-group"><label>Facilities</label><textarea id="editFacilities" rows="3">${escapeHtml(item.facilities || '')}</textarea></div>`;
        }
        document.getElementById('editFields').innerHTML = fields;
        document.getElementById('editModal').classList.add('active');
        
        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            let data = {};
            if (type === 'tour') {
                data = { title: document.getElementById('editTitle').value, price: parseInt(document.getElementById('editPrice').value), duration: document.getElementById('editDuration').value, imageUrl: document.getElementById('editImageUrl').value, description: document.getElementById('editDescription').value, itinerary: document.getElementById('editItinerary').value };
            } else if (type === 'activity') {
                data = { title: document.getElementById('editTitle').value, price: parseInt(document.getElementById('editPrice').value), duration: document.getElementById('editDuration').value, imageUrl: document.getElementById('editImageUrl').value, description: document.getElementById('editDescription').value, included: document.getElementById('editIncluded')?.value, highlights: document.getElementById('editHighlights')?.value, whatToBring: document.getElementById('editWhatToBring')?.value, additionalInfo: document.getElementById('editAdditionalInfo')?.value, terms: document.getElementById('editTerms')?.value };
            } else {
                data = { name: document.getElementById('editName').value, price: parseInt(document.getElementById('editPrice').value), location: document.getElementById('editLocation').value, imageUrl: document.getElementById('editImageUrl').value, description: document.getElementById('editDescription').value, facilities: document.getElementById('editFacilities')?.value };
            }
            let putRes = await fetch(`/api/${type}s/${id}`, { method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify(data) });
            if (putRes.ok) { showToast('Updated!'); closeModal(); loadSection(currentSection); }
            else showToast('Update failed', 'error');
        };
    }

    function confirmDelete(type, id) {
        pendingDelete = { type, id };
        document.getElementById('deleteModal').classList.add('active');
    }

    document.getElementById('confirmDeleteBtn').onclick = async () => {
        if (pendingDelete) {
            let res = await fetch(`/api/${pendingDelete.type}s/${pendingDelete.id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) { showToast('Deleted!'); closeDeleteModal(); loadSection(currentSection); }
            else showToast('Delete failed', 'error');
        }
    };

    function closeModal() { document.getElementById('editModal').classList.remove('active'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); pendingDelete = null; }
    function escapeHtml(t) { if (!t) return ''; let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
