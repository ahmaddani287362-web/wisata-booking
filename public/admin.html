<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Premium - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly Admin</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="#" onclick="logout()" class="btn-admin">Logout</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <!-- Login Form -->
        <div id="loginForm" class="admin-login">
            <h2>🔐 Admin Login</h2>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button class="btn-primary" onclick="login()" style="width:100%">Login</button>
        </div>
        
        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none;">
            <!-- Stats Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px;">
                <div style="background: linear-gradient(135deg, #0f766e, #14b8a6); padding: 24px; border-radius: 24px; color: white;">
                    <h3 style="font-size: 2rem;" id="tourCount">0</h3>
                    <p>Total Tours</p>
                </div>
                <div style="background: linear-gradient(135deg, #0f766e, #14b8a6); padding: 24px; border-radius: 24px; color: white;">
                    <h3 style="font-size: 2rem;" id="villaCount">0</h3>
                    <p>Total Villas</p>
                </div>
            </div>
            
            <!-- Add Tour Form -->
            <div class="admin-section">
                <h2>➕ Tambah Tour Baru</h2>
                <form id="addTourForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <input type="text" name="title" placeholder="Nama Tour" required style="grid-column: span 2;">
                    <input type="number" name="price" placeholder="Harga (Rp)" required>
                    <input type="text" name="duration" placeholder="Durasi (4D3N)">
                    <input type="text" name="imageUrl" placeholder="URL Gambar (opsional)" style="grid-column: span 2;">
                    <textarea name="description" placeholder="Deskripsi" style="grid-column: span 2;" rows="3"></textarea>
                    <textarea name="itinerary" placeholder="Itinerary (pisahkan dengan newline)" style="grid-column: span 2;" rows="4"></textarea>
                    <button type="submit" class="btn-primary" style="grid-column: span 2;">Simpan Tour</button>
                </form>
            </div>
            
            <!-- Add Villa Form -->
            <div class="admin-section">
                <h2>🏡 Tambah Villa Baru</h2>
                <form id="addVillaForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <input type="text" name="name" placeholder="Nama Villa" required style="grid-column: span 2;">
                    <input type="number" name="price" placeholder="Harga per malam (Rp)" required>
                    <input type="text" name="location" placeholder="Lokasi">
                    <input type="text" name="imageUrl" placeholder="URL Gambar (opsional)" style="grid-column: span 2;">
                    <textarea name="description" placeholder="Deskripsi" style="grid-column: span 2;" rows="3"></textarea>
                    <textarea name="facilities" placeholder="Fasilitas (pisahkan dengan koma)" style="grid-column: span 2;" rows="3"></textarea>
                    <button type="submit" class="btn-primary" style="grid-column: span 2;">Simpan Villa</button>
                </form>
            </div>
            
            <!-- Tours Table -->
            <div class="admin-section">
                <h2>📋 Data Tours</h2>
                <div id="toursTable" class="admin-table"></div>
            </div>
            
            <!-- Villas Table -->
            <div class="admin-section">
                <h2>📋 Data Villas</h2>
                <div id="villasTable" class="admin-table"></div>
            </div>
        </div>
    </div>
</main>

<!-- Modal Edit -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">✏️ Edit Data</h3>
        <form id="editForm">
            <input type="hidden" id="editId">
            <input type="hidden" id="editType">
            <div id="editFields"></div>
            <div class="modal-buttons">
                <button type="submit" class="btn-primary">Simpan Perubahan</button>
                <button type="button" class="btn-outline" onclick="closeModal()">Batal</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Delete Confirm -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h3>⚠️ Konfirmasi Hapus</h3>
        <p style="margin: 20px 0;">Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.</p>
        <div class="modal-buttons" style="justify-content: center;">
            <button class="btn-danger" id="confirmDeleteBtn">Ya, Hapus</button>
            <button class="btn-outline" onclick="closeDeleteModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    let pendingDeleteId = null;
    let pendingDeleteType = null;
    
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (res.ok) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            showToast('Login berhasil! Selamat datang Admin');
            loadAllData();
        } else {
            showToast('Login gagal! Periksa username dan password', 'error');
        }
    }
    
    async function logout() {
        await fetch('/api/admin/logout', { method: 'POST' });
        showToast('Logout berhasil');
        setTimeout(() => location.reload(), 1000);
    }
    
    async function loadAllData() {
        await loadTours();
        await loadVillas();
    }
    
    async function loadTours() {
        const res = await fetch('/api/tours');
        const tours = await res.json();
        document.getElementById('tourCount').innerText = tours.length;
        if (!tours.length) {
            document.getElementById('toursTable').innerHTML = '<p style="text-align:center; padding:40px;">Belum ada data tour</p>';
            return;
        }
        document.getElementById('toursTable').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Gambar</th>
                        <th>Nama</th>
                        <th>Harga</th>
                        <th>Durasi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    ${tours.map(t => `
                        <tr>
                            <td>${t.id}</td>
                            <td><img src="${t.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" width="50" height="50" style="border-radius:12px; object-fit:cover;"></td>
                            <td><strong>${escapeHtml(t.title)}</strong></td>
                            <td>Rp ${new Intl.NumberFormat('id-ID').format(t.price)}</td>
                            <td>${t.duration || '-'}</td>
                            <td>
                                <button class="btn-warning" onclick="openEditModal('tour', ${t.id})" style="padding:8px 16px; margin:0 4px;">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn-danger" onclick="confirmDelete('tour', ${t.id})" style="padding:8px 16px; margin:0 4px;">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function loadVillas() {
        const res = await fetch('/api/villas');
        const villas = await res.json();
        document.getElementById('villaCount').innerText = villas.length;
        if (!villas.length) {
            document.getElementById('villasTable').innerHTML = '<p style="text-align:center; padding:40px;">Belum ada data villa</p>';
            return;
        }
        document.getElementById('villasTable').innerHTML = `
            <table style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Gambar</th>
                        <th>Nama</th>
                        <th>Harga</th>
                        <th>Lokasi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    ${villas.map(v => `
                        <tr>
                            <td>${v.id}</td>
                            <td><img src="${v.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" width="50" height="50" style="border-radius:12px; object-fit:cover;"></td>
                            <td><strong>${escapeHtml(v.name)}</strong></td>
                            <td>Rp ${new Intl.NumberFormat('id-ID').format(v.price)}/malam</td>
                            <td>${escapeHtml(v.location) || '-'}</td>
                            <td>
                                <button class="btn-warning" onclick="openEditModal('villa', ${v.id})" style="padding:8px 16px; margin:0 4px;">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn-danger" onclick="confirmDelete('villa', ${v.id})" style="padding:8px 16px; margin:0 4px;">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    // Add Tour Form
    document.getElementById('addTourForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
            title: formData.get('title'),
            price: parseInt(formData.get('price')),
            duration: formData.get('duration'),
            imageUrl: formData.get('imageUrl'),
            description: formData.get('description'),
            itinerary: formData.get('itinerary')
        };
        const res = await fetch('/api/tours', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showToast('Tour berhasil ditambahkan!');
            loadTours();
            e.target.reset();
        } else {
            showToast('Gagal menambahkan tour', 'error');
        }
    });
    
    // Add Villa Form
    document.getElementById('addVillaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
            name: formData.get('name'),
            price: parseInt(formData.get('price')),
            location: formData.get('location'),
            imageUrl: formData.get('imageUrl'),
            description: formData.get('description'),
            facilities: formData.get('facilities')
        };
        const res = await fetch('/api/villas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showToast('Villa berhasil ditambahkan!');
            loadVillas();
            e.target.reset();
        } else {
            showToast('Gagal menambahkan villa', 'error');
        }
    });
    
    // Open Edit Modal
    async function openEditModal(type, id) {
        const res = await fetch(`/api/${type}s/${id}`);
        const item = await res.json();
        
        document.getElementById('editId').value = id;
        document.getElementById('editType').value = type;
        document.getElementById('modalTitle').innerHTML = type === 'tour' ? '✏️ Edit Tour' : '✏️ Edit Villa';
        
        let fieldsHtml = '';
        if (type === 'tour') {
            fieldsHtml = `
                <input type="text" id="editTitle" value="${escapeHtml(item.title)}" placeholder="Nama Tour" required>
                <input type="number" id="editPrice" value="${item.price}" placeholder="Harga" required>
                <input type="text" id="editDuration" value="${item.duration || ''}" placeholder="Durasi (4D3N)">
                <input type="text" id="editImageUrl" value="${item.image || ''}" placeholder="URL Gambar">
                <textarea id="editDescription" placeholder="Deskripsi" rows="3">${escapeHtml(item.description || '')}</textarea>
                <textarea id="editItinerary" placeholder="Itinerary" rows="4">${escapeHtml(item.itinerary || '')}</textarea>
            `;
        } else {
            fieldsHtml = `
                <input type="text" id="editName" value="${escapeHtml(item.name)}" placeholder="Nama Villa" required>
                <input type="number" id="editPrice" value="${item.price}" placeholder="Harga per malam" required>
                <input type="text" id="editLocation" value="${escapeHtml(item.location || '')}" placeholder="Lokasi">
                <input type="text" id="editImageUrl" value="${item.image || ''}" placeholder="URL Gambar">
                <textarea id="editDescription" placeholder="Deskripsi" rows="3">${escapeHtml(item.description || '')}</textarea>
                <textarea id="editFacilities" placeholder="Fasilitas" rows="3">${escapeHtml(item.facilities || '')}</textarea>
            `;
        }
        
        document.getElementById('editFields').innerHTML = fieldsHtml;
        document.getElementById('editModal').classList.add('active');
    }
    
    // Edit Form Submit
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const type = document.getElementById('editType').value;
        
        let data = {};
        if (type === 'tour') {
            data = {
                title: document.getElementById('editTitle').value,
                price: parseInt(document.getElementById('editPrice').value),
                duration: document.getElementById('editDuration').value,
                imageUrl: document.getElementById('editImageUrl').value,
                description: document.getElementById('editDescription').value,
                itinerary: document.getElementById('editItinerary').value
            };
        } else {
            data = {
                name: document.getElementById('editName').value,
                price: parseInt(document.getElementById('editPrice').value),
                location: document.getElementById('editLocation').value,
                imageUrl: document.getElementById('editImageUrl').value,
                description: document.getElementById('editDescription').value,
                facilities: document.getElementById('editFacilities').value
            };
        }
        
        const res = await fetch(`/api/${type}s/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            showToast('Data berhasil diupdate!');
            closeModal();
            loadAllData();
        } else {
            showToast('Gagal mengupdate data', 'error');
        }
    });
    
    // Confirm Delete
    function confirmDelete(type, id) {
        pendingDeleteId = id;
        pendingDeleteType = type;
        document.getElementById('deleteModal').classList.add('active');
    }
    
    // Execute Delete
    document.getElementById('confirmDeleteBtn').onclick = async () => {
        if (pendingDeleteId && pendingDeleteType) {
            const res = await fetch(`/api/${pendingDeleteType}s/${pendingDeleteId}`, { method: 'DELETE' });
            if (res.ok) {
                showToast('Data berhasil dihapus!');
                closeDeleteModal();
                loadAllData();
            } else {
                showToast('Gagal menghapus data', 'error');
            }
        }
    };
    
    function closeModal() {
        document.getElementById('editModal').classList.remove('active');
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        pendingDeleteId = null;
        pendingDeleteType = null;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Check auth on load
    fetch('/api/admin/check').then(res => res.json()).then(data => {
        if (data.isAdmin) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
        }
    });
</script>
</body>
</html>
