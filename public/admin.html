<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly Admin</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <!-- Login Form -->
        <div id="loginForm" class="admin-login">
            <h2 style="text-align:center;">Admin Login</h2>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button class="btn-primary" onclick="login()" style="width:100%">Login</button>
        </div>
        
        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none;">
            <!-- Add Tour -->
            <div class="admin-section">
                <h2>➕ Tambah Tour</h2>
                <form id="addTourForm">
                    <input type="text" name="title" placeholder="Nama Tour" required style="width:100%; padding:10px; margin:5px 0;">
                    <input type="number" name="price" placeholder="Harga" required style="width:100%; padding:10px; margin:5px 0;">
                    <input type="text" name="duration" placeholder="Durasi (4D3N)" style="width:100%; padding:10px; margin:5px 0;">
                    <textarea name="description" placeholder="Deskripsi" style="width:100%; padding:10px; margin:5px 0;"></textarea>
                    <textarea name="itinerary" placeholder="Itinerary" style="width:100%; padding:10px; margin:5px 0;"></textarea>
                    <button type="submit" class="btn-primary">Simpan Tour</button>
                </form>
            </div>
            
            <!-- Add Villa -->
            <div class="admin-section">
                <h2>➕ Tambah Villa</h2>
                <form id="addVillaForm">
                    <input type="text" name="name" placeholder="Nama Villa" required style="width:100%; padding:10px; margin:5px 0;">
                    <input type="number" name="price" placeholder="Harga per malam" required style="width:100%; padding:10px; margin:5px 0;">
                    <input type="text" name="location" placeholder="Lokasi" style="width:100%; padding:10px; margin:5px 0;">
                    <textarea name="description" placeholder="Deskripsi" style="width:100%; padding:10px; margin:5px 0;"></textarea>
                    <textarea name="facilities" placeholder="Fasilitas" style="width:100%; padding:10px; margin:5px 0;"></textarea>
                    <button type="submit" class="btn-primary">Simpan Villa</button>
                </form>
            </div>
            
            <!-- Tours Table -->
            <div class="admin-section">
                <h2>📋 Data Tours</h2>
                <div id="toursTable" class="admin-table"></div>
            </div>
            
            <!-- Villas Table -->
            <div class="admin-section">
                <h2>📋 Data Villas</h2>
                <div id="villasTable" class="admin-table"></div>
            </div>
        </div>
    </div>
</main>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (res.ok) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadTours();
            loadVillas();
        } else {
            alert('Login gagal!');
        }
    }
    
    async function logout() {
        await fetch('/api/admin/logout', { method: 'POST' });
        location.reload();
    }
    
    async function loadTours() {
        const res = await fetch('/api/tours');
        const tours = await res.json();
        if (!tours.length) {
            document.getElementById('toursTable').innerHTML = '<p>Belum ada data</p>';
            return;
        }
        document.getElementById('toursTable').innerHTML = `
            <table>
                <tr><th>ID</th><th>Nama</th><th>Harga</th><th>Durasi</th><th>Aksi</th></tr>
                ${tours.map(t => `
                    <tr>
                        <td>${t.id}</td>
                        <td>${t.title}</td>
                        <td>Rp ${new Intl.NumberFormat('id-ID').format(t.price)}</td>
                        <td>${t.duration || '-'}</td>
                        <td>
                            <button class="btn-edit" onclick="editTour(${t.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteTour(${t.id})">Hapus</button>
                        </td>
                    </tr>
                `).join('')}
            </table>
        `;
    }
    
    async function loadVillas() {
        const res = await fetch('/api/villas');
        const villas = await res.json();
        if (!villas.length) {
            document.getElementById('villasTable').innerHTML = '<p>Belum ada data</p>';
            return;
        }
        document.getElementById('villasTable').innerHTML = `
            <table>
                <tr><th>ID</th><th>Nama</th><th>Harga</th><th>Lokasi</th><th>Aksi</th></tr>
                ${villas.map(v => `
                    <tr>
                        <td>${v.id}</td>
                        <td>${v.name}</td>
                        <td>Rp ${new Intl.NumberFormat('id-ID').format(v.price)}</td>
                        <td>${v.location || '-'}</td>
                        <td>
                            <button class="btn-edit" onclick="editVilla(${v.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteVilla(${v.id})">Hapus</button>
                        </td>
                    </tr>
                `).join('')}
            </table>
        `;
    }
    
    document.getElementById('addTourForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        await fetch('/api/tours', { method: 'POST', body: formData });
        loadTours();
        e.target.reset();
        alert('Tour berhasil ditambahkan!');
    });
    
    document.getElementById('addVillaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        await fetch('/api/villas', { method: 'POST', body: formData });
        loadVillas();
        e.target.reset();
        alert('Villa berhasil ditambahkan!');
    });
    
    async function deleteTour(id) {
        if (confirm('Hapus tour ini?')) {
            await fetch(`/api/tours/${id}`, { method: 'DELETE' });
            loadTours();
        }
    }
    
    async function deleteVilla(id) {
        if (confirm('Hapus villa ini?')) {
            await fetch(`/api/villas/${id}`, { method: 'DELETE' });
            loadVillas();
        }
    }
    
    async function editTour(id) {
        const res = await fetch(`/api/tours/${id}`);
        const tour = await res.json();
        const title = prompt('Nama tour:', tour.title);
        const price = prompt('Harga:', tour.price);
        if (title && price) {
            await fetch(`/api/tours/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...tour, title, price: parseInt(price) })
            });
            loadTours();
        }
    }
    
    async function editVilla(id) {
        const res = await fetch(`/api/villas/${id}`);
        const villa = await res.json();
        const name = prompt('Nama villa:', villa.name);
        const price = prompt('Harga:', villa.price);
        if (name && price) {
            await fetch(`/api/villas/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...villa, name, price: parseInt(price) })
            });
            loadVillas();
        }
    }
    
    // Check if already logged in
    fetch('/api/admin/check').then(res => res.json()).then(data => {
        if (data.isAdmin) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadTours();
            loadVillas();
        }
    });
</script>
</body>
</html>
