<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a, #1e293b); }
        .login-card { background: white; padding: 48px; border-radius: 32px; width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 12px 0; border: 1.5px solid #e2e8f0; border-radius: 16px; }
        .btn-primary { background: #0f766e; color: white; padding: 12px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .admin-wrapper { display: flex; }
        .sidebar { width: 260px; background: #0f172a; color: white; min-height: 100vh; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid #334155; }
        .nav-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: #0f766e; }
        .main-content { flex: 1; padding: 24px; }
        .top-bar { background: white; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 20px; border-radius: 40px; border: none; cursor: pointer; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .btn-edit { background: #f59e0b; color: white; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; margin-right: 8px; }
        .btn-delete { background: #ef4444; color: white; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-add { background: #0f766e; color: white; padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; }
        .form-container { display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 16px; }
        .form-container.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; padding: 32px; width: 550px; max-width: 90%; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1100; }
        .table-image { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button class="btn-primary" onclick="login()">Login</button>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="sidebar">
            <div class="sidebar-header"><h2>Wanderly CMS</h2></div>
            <div class="nav-item" data-section="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" data-section="tours"><i class="fas fa-umbrella-beach"></i> Tours</div>
            <div class="nav-item" data-section="activities"><i class="fas fa-biking"></i> Activities</div>
            <div class="nav-item" data-section="villas"><i class="fas fa-home"></i> Villas</div>
            <div class="nav-item" data-section="contacts"><i class="fas fa-envelope"></i> Contacts</div>
        </div>
        <div class="main-content">
            <div class="top-bar"><h1 id="pageTitle">Dashboard</h1><button class="logout-btn" onclick="logout()">Logout</button></div>
            <div id="contentArea">Loading...</div>
        </div>
    </div>
</div>

<div id="editModal" class="modal"><div class="modal-content"><h3 id="modalTitle">Edit</h3><form id="editForm"><div id="editFields"></div><div class="modal-buttons"><button type="submit" class="btn-primary">Save</button><button type="button" onclick="closeModal()">Cancel</button></div></form></div></div>
<div id="deleteModal" class="modal"><div class="modal-content"><h3>Confirm Delete</h3><p>Are you sure?</p><div class="modal-buttons"><button class="btn-delete" id="confirmDeleteBtn">Delete</button><button onclick="closeDeleteModal()">Cancel</button></div></div></div>

<script>
    let token = localStorage.getItem('adminToken');
    let pendingDelete = null;
    let currentSection = 'dashboard';

    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function getHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }

    async function login() {
        let res = await fetch(API_ENDPOINTS.adminLogin, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        if (res.ok) {
            let data = await res.json();
            token = data.token;
            localStorage.setItem('adminToken', token);
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadSection('dashboard');
        } else alert('Login failed');
    }

    function logout() { localStorage.removeItem('adminToken'); location.reload(); }

    if (token) {
        fetch(API_ENDPOINTS.adminCheck, { headers: { 'Authorization': `Bearer ${token}` } })
            .then(r => r.json())
            .then(data => { if (data.isAdmin) { document.getElementById('loginContainer').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; loadSection('dashboard'); } });
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => loadSection(item.dataset.section));
    });

    async function loadSection(section) {
        currentSection = section;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector(`.nav-item[data-section="${section}"]`).classList.add('active');
        document.getElementById('pageTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
        if (section === 'dashboard') await loadDashboard();
        else if (section === 'tours') await loadTours();
        else if (section === 'activities') await loadActivities();
        else if (section === 'villas') await loadVillas();
        else if (section === 'contacts') await loadContacts();
    }

    async function loadDashboard() {
        let tours = await (await fetch(API_ENDPOINTS.tours)).json();
        let acts = await (await fetch(API_ENDPOINTS.activities)).json();
        let villas = await (await fetch(API_ENDPOINTS.villas)).json();
        document.getElementById('contentArea').innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
            <div class="card"><h3>${tours.length}</h3><p>Tours</p></div>
            <div class="card"><h3>${acts.length}</h3><p>Activities</p></div>
            <div class="card"><h3>${villas.length}</h3><p>Villas</p></div>
        </div>`;
    }

    async function loadTours() {
        let data = await (await fetch(API_ENDPOINTS.tours)).json();
        let html = `<div class="card"><div class="card-header"><h3>Tours</h3><button class="btn-add" onclick="toggleForm('tour')">+ Add</button></div>
            <div id="tourForm" class="form-container"><form id="addTourForm"><div class="form-group"><input name="title" placeholder="Title" required></div>
            <div class="form-group"><input name="price" type="number" placeholder="Price" required></div>
            <div class="form-group"><input name="duration" placeholder="Duration"></div>
            <div class="form-group"><input name="imageUrl" placeholder="Image URL"></div>
            <div class="form-group"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="form-group"><textarea name="itinerary" placeholder="What's Included" rows="4"></textarea></div>
            <button type="submit" class="btn-primary">Save</button></form></div>
            <table><thead><tr><th>ID</th><th>Image</th><th>Title</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.title)}</td><td>Rp ${d.price.toLocaleString()}</td>
            <td><button class="btn-edit" onclick="editItem('tour',${d.id})">Edit</button><button class="btn-delete" onclick="deleteItem('tour',${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addTourForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            await fetch(API_ENDPOINTS.tours, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title: fd.get('title'), price: parseInt(fd.get('price')), duration: fd.get('duration'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), itinerary: fd.get('itinerary') }) });
            showToast('Added!'); loadSection('tours');
        });
    }

    async function loadActivities() {
        let data = await (await fetch(API_ENDPOINTS.activities)).json();
        let html = `<div class="card"><div class="card-header"><h3>Activities</h3><button class="btn-add" onclick="toggleForm('activity')">+ Add</button></div>
            <div id="activityForm" class="form-container"><form id="addActivityForm"><div class="form-group"><input name="title" placeholder="Title" required></div>
            <div class="form-group"><input name="price" type="number" placeholder="Price" required></div>
            <div class="form-group"><input name="duration" placeholder="Duration"></div>
            <div class="form-group"><input name="imageUrl" placeholder="Image URL"></div>
            <div class="form-group"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="form-group"><textarea name="included" placeholder="What's Included" rows="4"></textarea></div>
            <div class="form-group"><textarea name="highlights" placeholder="Highlights" rows="3"></textarea></div>
            <div class="form-group"><textarea name="whatToBring" placeholder="What to Bring" rows="3"></textarea></div>
            <div class="form-group"><textarea name="additionalInfo" placeholder="Additional Info" rows="3"></textarea></div>
            <div class="form-group"><textarea name="terms" placeholder="Terms" rows="3"></textarea></div>
            <button type="submit" class="btn-primary">Save</button></form></div>
            <table><thead><tr><th>ID</th><th>Image</th><th>Title</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.title)}</td><td>Rp ${d.price.toLocaleString()}</td>
            <td><button class="btn-edit" onclick="editItem('activity',${d.id})">Edit</button><button class="btn-delete" onclick="deleteItem('activity',${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addActivityForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            await fetch(API_ENDPOINTS.activities, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ title: fd.get('title'), price: parseInt(fd.get('price')), duration: fd.get('duration'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), included: fd.get('included'), highlights: fd.get('highlights'), whatToBring: fd.get('whatToBring'), additionalInfo: fd.get('additionalInfo'), terms: fd.get('terms') }) });
            showToast('Added!'); loadSection('activities');
        });
    }

    async function loadVillas() {
        let data = await (await fetch(API_ENDPOINTS.villas)).json();
        let html = `<div class="card"><div class="card-header"><h3>Villas</h3><button class="btn-add" onclick="toggleForm('villa')">+ Add</button></div>
            <div id="villaForm" class="form-container"><form id="addVillaForm"><div class="form-group"><input name="name" placeholder="Name" required></div>
            <div class="form-group"><input name="price" type="number" placeholder="Price" required></div>
            <div class="form-group"><input name="location" placeholder="Location"></div>
            <div class="form-group"><input name="imageUrl" placeholder="Image URL"></div>
            <div class="form-group"><textarea name="description" placeholder="Description" rows="3"></textarea></div>
            <div class="form-group"><textarea name="facilities" placeholder="Facilities" rows="3"></textarea></div>
            <button type="submit" class="btn-primary">Save</button></form></div>
            <table><thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${d.id}</td><td><img class="table-image" src="${d.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}"></td><td>${escapeHtml(d.name)}</td><td>Rp ${d.price.toLocaleString()}/night</td>
            <td><button class="btn-edit" onclick="editItem('villa',${d.id})">Edit</button><button class="btn-delete" onclick="deleteItem('villa',${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('addVillaForm')?.addEventListener('submit', async (e) => {
            e.preventDefault(); let fd = new FormData(e.target);
            await fetch(API_ENDPOINTS.villas, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ name: fd.get('name'), price: parseInt(fd.get('price')), location: fd.get('location'), imageUrl: fd.get('imageUrl'), description: fd.get('description'), facilities: fd.get('facilities') }) });
            showToast('Added!'); loadSection('villas');
        });
    }

    async function loadContacts() {
        let res = await fetch(API_ENDPOINTS.contacts, { headers: getHeaders() });
        if (!res.ok) return;
        let data = await res.json();
        let html = `<div class="card"><h3>Contact Messages</h3><table><thead><tr><th>Name</th><th>Email</th><th>Message</th><th>Actions</th></tr></thead><tbody>`;
        data.forEach(d => { html += `<tr><td>${escapeHtml(d.name)}</td><td>${escapeHtml(d.email)}</td><td>${escapeHtml(d.message).substring(0,50)}...</td><td><button class="btn-delete" onclick="deleteItem('contact',${d.id})">Delete</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('contentArea').innerHTML = html;
    }

    function toggleForm(type) { document.getElementById(`${type}Form`).classList.toggle('active'); }

    async function editItem(type, id) {
        let res = await fetch(`${API_ENDPOINTS[type]}/${id}`);
        let item = await res.json();
        document.getElementById('modalTitle').innerText = `Edit ${type}`;
        let fields = '';
        if (type === 'tour') fields = `<div class="form-group"><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div>
            <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
            <div class="form-group"><label>Duration</label><input id="editDuration" value="${escapeHtml(item.duration || '')}"></div>
            <div class="form-group"><label>Image URL</label><input id="editImage" value="${escapeHtml(item.image || '')}"></div>
            <div class="form-group"><label>Description</label><textarea id="editDesc" rows="3">${escapeHtml(item.description || '')}</textarea></div>
            <div class="form-group"><label>What's Included</label><textarea id="editItinerary" rows="4">${escapeHtml(item.itinerary || '')}</textarea></div>`;
        else if (type === 'activity') fields = `<div class="form-group"><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div>
            <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
            <div class="form-group"><label>Duration</label><input id="editDuration" value="${escapeHtml(item.duration || '')}"></div>
            <div class="form-group"><label>Image URL</label><input id="editImage" value="${escapeHtml(item.image || '')}"></div>
            <div class="form-group"><label>Description</label><textarea id="editDesc" rows="3">${escapeHtml(item.description || '')}</textarea></div>
            <div class="form-group"><label>What's Included</label><textarea id="editIncluded" rows="4">${escapeHtml(item.included || '')}</textarea></div>
            <div class="form-group"><label>Highlights</label><textarea id="editHighlights" rows="3">${escapeHtml(item.highlights || '')}</textarea></div>
            <div class="form-group"><label>What to Bring</label><textarea id="editWhatToBring" rows="3">${escapeHtml(item.whatToBring || '')}</textarea></div>
            <div class="form-group"><label>Additional Info</label><textarea id="editAdditionalInfo" rows="3">${escapeHtml(item.additionalInfo || '')}</textarea></div>
            <div class="form-group"><label>Terms</label><textarea id="editTerms" rows="3">${escapeHtml(item.terms || '')}</textarea></div>`;
        else fields = `<div class="form-group"><label>Name</label><input id="editName" value="${escapeHtml(item.name)}"></div>
            <div class="form-group"><label>Price</label><input id="editPrice" value="${item.price}"></div>
            <div class="form-group"><label>Location</label><input id="editLocation" value="${escapeHtml(item.location || '')}"></div>
            <div class="form-group"><label>Image URL</label><input id="editImage" value="${escapeHtml(item.image || '')}"></div>
            <div class="form-group"><label>Description</label><textarea id="editDesc" rows="3">${escapeHtml(item.description || '')}</textarea></div>
            <div class="form-group"><label>Facilities</label><textarea id="editFacilities" rows="3">${escapeHtml(item.facilities || '')}</textarea></div>`;
        document.getElementById('editFields').innerHTML = fields;
        document.getElementById('editModal').classList.add('active');
        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            let data = {};
            if (type === 'tour') data = { title: document.getElementById('editTitle').value, price: parseInt(document.getElementById('editPrice').value), duration: document.getElementById('editDuration').value, imageUrl: document.getElementById('editImage').value, description: document.getElementById('editDesc').value, itinerary: document.getElementById('editItinerary').value };
            else if (type === 'activity') data = { title: document.getElementById('editTitle').value, price: parseInt(document.getElementById('editPrice').value), duration: document.getElementById('editDuration').value, imageUrl: document.getElementById('editImage').value, description: document.getElementById('editDesc').value, included: document.getElementById('editIncluded')?.value, highlights: document.getElementById('editHighlights')?.value, whatToBring: document.getElementById('editWhatToBring')?.value, additionalInfo: document.getElementById('editAdditionalInfo')?.value, terms: document.getElementById('editTerms')?.value };
            else data = { name: document.getElementById('editName').value, price: parseInt(document.getElementById('editPrice').value), location: document.getElementById('editLocation').value, imageUrl: document.getElementById('editImage').value, description: document.getElementById('editDesc').value, facilities: document.getElementById('editFacilities')?.value };
            await fetch(`${API_ENDPOINTS[type]}/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(data) });
            showToast('Updated!'); closeModal(); loadSection(currentSection);
        };
    }

    function deleteItem(type, id) { pendingDelete = { type, id }; document.getElementById('deleteModal').classList.add('active'); }
    document.getElementById('confirmDeleteBtn').onclick = async () => {
        if (pendingDelete) { await fetch(`${API_ENDPOINTS[pendingDelete.type]}/${pendingDelete.id}`, { method: 'DELETE', headers: getHeaders() }); showToast('Deleted!'); closeDeleteModal(); loadSection(currentSection); }
    };
    function closeModal() { document.getElementById('editModal').classList.remove('active'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); pendingDelete = null; }
    function escapeHtml(t) { if (!t) return ''; let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
