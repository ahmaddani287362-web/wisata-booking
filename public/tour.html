<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Packages - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 48px;
            border-radius: 0 0 48px 48px;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        .page-header p {
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #0f766e;
            color: white;
        }
        .result-count {
            text-align: center;
            margin-bottom: 32px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html" class="active">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="page-header">
        <div class="container">
            <h1>✨ Tour Packages</h1>
            <p>Jelajahi keindahan Bali dengan paket wisata terbaik kami</p>
        </div>
    </div>

    <div class="container">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All Tours</button>
            <button class="filter-btn" data-filter="popular">Popular</button>
            <button class="filter-btn" data-filter="adventure">Adventure</button>
            <button class="filter-btn" data-filter="culture">Culture</button>
        </div>
        <div class="result-count" id="resultCount">Menampilkan semua tour</div>
        <div class="grid" id="tourList">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<a href="https://wa.me/6281234567890" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    let allTours = [];

    async function loadTours() {
        try {
            const res = await fetch('/api/tours');
            allTours = await res.json();
            renderTours(allTours);
        } catch(e) { console.error(e); }
    }

    function renderTours(tours) {
        const container = document.getElementById('tourList');
        const resultCount = document.getElementById('resultCount');
        
        if (!tours.length) {
            container.innerHTML = '<p style="text-align:center">Belum ada data tour</p>';
            resultCount.textContent = 'Menampilkan 0 tour';
            return;
        }
        
        resultCount.textContent = `Menampilkan ${tours.length} tour packages`;
        
        container.innerHTML = tours.map(tour => `
            <div class="card" onclick="location.href='/detail.html?type=tour&id=${tour.id}'">
                <img class="card-img" src="${tour.image || 'https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg'}" alt="${tour.title}">
                <div class="card-content">
                    <div class="card-title">${escapeHtml(tour.title)}</div>
                    <div class="card-price">Rp ${new Intl.NumberFormat('id-ID').format(tour.price)}</div>
                    <div class="card-detail"><i class="far fa-clock"></i> ${tour.duration || 'Full Day'}</div>
                    <div style="margin-top: 16px;"><span class="btn-outline">View Details →</span></div>
                </div>
            </div>
        `).join('');
    }

    function filterTours(filter) {
        if (filter === 'all') {
            renderTours(allTours);
            document.getElementById('resultCount').textContent = `Menampilkan semua ${allTours.length} tour`;
        } else if (filter === 'popular') {
            const popular = allTours.slice(0, 4);
            renderTours(popular);
            document.getElementById('resultCount').textContent = `Menampilkan ${popular.length} tour popular`;
        } else if (filter === 'adventure') {
            const adventure = allTours.filter(t => t.title.toLowerCase().includes('adventure') || t.title.toLowerCase().includes('atv') || t.title.toLowerCase().includes('rafting'));
            renderTours(adventure);
            document.getElementById('resultCount').textContent = `Menampilkan ${adventure.length} tour adventure`;
        } else if (filter === 'culture') {
            const culture = allTours.filter(t => t.title.toLowerCase().includes('culture') || t.title.toLowerCase().includes('ubud') || t.title.toLowerCase().includes('temple'));
            renderTours(culture);
            document.getElementById('resultCount').textContent = `Menampilkan ${culture.length} tour culture`;
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            filterTours(this.dataset.filter);
        });
    });

    loadTours();
</script>
</body>
</html>
