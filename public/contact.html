<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Wanderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">Wanderly</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/tour.html">Tours</a>
            <a href="/activities.html">Activities</a>
            <a href="/villa.html">Villas</a>
            <a href="/contact.html" class="active">Contact</a>
        </div>
    </div>
</div>

<main>
    <div class="container section">
        <h2 class="section-title">Contact Us</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 48px;">
            <!-- Contact Info -->
            <div>
                <div style="background: #f8fafc; padding: 32px; border-radius: 28px;">
                    <i class="fab fa-whatsapp" style="font-size: 48px; color: #25D366;"></i>
                    <h3 style="margin: 16px 0;">WhatsApp</h3>
                    <p>+62 812 3456 7890</p>
                    <a href="https://wa.me/6281234567890" class="btn-primary" style="margin-top: 20px; display: inline-block;">Chat Now →</a>
                </div>
                <div style="margin-top: 24px;">
                    <p><i class="fas fa-envelope"></i> hello@wanderly.com</p>
                    <p><i class="fas fa-map-marker-alt"></i> Bali, Indonesia</p>
                </div>
            </div>

            <!-- Booking Form -->
            <div>
                <div style="background: white; padding: 32px; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 24px;">📝 Booking Form</h3>
                    <form id="contactForm">
                        <input type="text" id="contactName" placeholder="Nama Lengkap" required style="width:100%; padding:14px; margin-bottom:16px; border:1.5px solid #e2e8f0; border-radius:16px;">
                        <input type="email" id="contactEmail" placeholder="Email" required style="width:100%; padding:14px; margin-bottom:16px; border:1.5px solid #e2e8f0; border-radius:16px;">
                        <input type="tel" id="contactPhone" placeholder="Nomor WhatsApp" style="width:100%; padding:14px; margin-bottom:16px; border:1.5px solid #e2e8f0; border-radius:16px;">
                        <textarea id="contactMessage" placeholder="Pesan / Pertanyaan / Booking Request" rows="5" required style="width:100%; padding:14px; margin-bottom:24px; border:1.5px solid #e2e8f0; border-radius:16px;"></textarea>
                        <button type="submit" class="btn-primary" style="width:100%;">Kirim Pesan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <p>© 2024 Wanderly — Premium Travel Booking</p>
    </div>
</footer>

<a href="https://wa.me/6281234567890" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('contactName').value,
            email: document.getElementById('contactEmail').value,
            phone: document.getElementById('contactPhone').value,
            message: document.getElementById('contactMessage').value
        };
        const res = await fetch('/api/contacts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            alert('Pesan terkirim! Kami akan segera merespon via WhatsApp/Email.');
            e.target.reset();
        } else {
            alert('Gagal mengirim pesan. Silakan coba lagi.');
        }
    });
</script>
</body>
</html>
